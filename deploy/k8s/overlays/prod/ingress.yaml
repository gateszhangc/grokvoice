apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: grokvoice-live
  namespace: grokvoice
  annotations:
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - grokvoice.homes
      secretName: grokvoice-live-tls
  rules:
    - host: grokvoice.homes
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: grokvoice
                port:
                  number: 80
