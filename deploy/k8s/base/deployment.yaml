apiVersion: apps/v1
kind: Deployment
metadata:
  name: grokvoice
  labels:
    app.kubernetes.io/name: grokvoice
    app.kubernetes.io/part-of: grokvoice
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: grokvoice
      app.kubernetes.io/part-of: grokvoice
  template:
    metadata:
      labels:
        app.kubernetes.io/name: grokvoice
        app.kubernetes.io/part-of: grokvoice
    spec:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: node-role.kubernetes.io/control-plane
                    operator: DoesNotExist
      containers:
        - name: web
          image: registry.144.91.77.245.sslip.io/grokvoice:bootstrap
          imagePullPolicy: IfNotPresent
          env:
            - name: NODE_ENV
              value: production
            - name: PORT
              value: "3000"
            - name: HOST
              value: 0.0.0.0
            - name: CANONICAL_HOST
              value: grokvoice.homes
          ports:
            - name: http
              containerPort: 3000
          readinessProbe:
            httpGet:
              path: /healthz
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 20
          startupProbe:
            httpGet:
              path: /healthz
              port: 3000
            failureThreshold: 30
            periodSeconds: 5
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 256Mi
