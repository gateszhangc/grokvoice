apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: grokvoice
  namespace: argocd
spec:
  project: grokvoice
  source:
    repoURL: https://github.com/gateszhangc/grokvoice.git
    targetRevision: main
    path: deploy/k8s/overlays/prod
  destination:
    server: https://kubernetes.default.svc
    namespace: grokvoice
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
